spring.application.name=GenAI Conversational BI Assistant
server.port=8080

spring.datasource.url=jdbc:h2:file:./localdb/genai_bi;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always

app.cache.ttl-minutes=1440
app.cache.refresh-ms=60000
app.vector.similarity-threshold=0.72
app.query.max-rows=200

app.gemini.base-url=https://generativelanguage.googleapis.com
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-3-flash-preview
app.gemini.temperature=0.1
app.gemini.max-output-tokens=2048
